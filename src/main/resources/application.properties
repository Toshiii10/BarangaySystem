# 1. The Database Address (The "I2C Address")
spring.datasource.url=jdbc:mysql://localhost:3306/barangay_db

# 2. Your MySQL Credentials
spring.datasource.username=root
# Change this if you have a password set for your MySQL root user!
spring.datasource.password= 

# 3. The Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. Hibernate Settings (The Magic Part)
# "update" tells Spring Boot to automatically create or modify your database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update

# This prints the SQL commands Spring Boot is running in your terminal so you can see what it's doing
spring.jpa.show-sql=true