<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Barangay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Barangay Management System</span>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="index.html">Residents</a>
                <a class="nav-link" href="blotter.html">Blotter Records</a>
            </div>
            <div class="d-flex">
                <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Overview Statistics</h2>
        
        <div class="row g-4">
            <!-- Total Residents Widget -->
            <div class="col-md-4">
                <div class="card text-white bg-primary shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Total Population</h5>
                        <h1 class="display-3 fw-bold" id="totalResidents">0</h1>
                        <p class="card-text">Registered residents in the system.</p>
                    </div>
                </div>
            </div>

            <!-- Pending Documents Widget -->
            <div class="col-md-4">
                <div class="card text-white bg-success shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Pending Clearances</h5>
                        <h1 class="display-3 fw-bold" id="pendingDocuments">0</h1>
                        <p class="card-text">Documents awaiting approval.</p>
                    </div>
                </div>
            </div>

            <!-- Active Blotters Widget -->
            <div class="col-md-4">
                <div class="card text-white bg-danger shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Active Blotter Cases</h5>
                        <h1 class="display-3 fw-bold" id="activeBlotters">0</h1>
                        <p class="card-text">Unresolved incidents or complaints.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
