<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Management System</title>
    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navigation Bar (Updated with working links) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Barangay Management System</span>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="index.html">Residents</a>
                <a class="nav-link" href="blotter.html">Blotter Records</a>
            </div>
        <div class="d-flex">
            <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Registration Form Card -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="card-title mb-0">Register New Resident</h5>
            </div>
            <div class="card-body">
                <form id="residentForm">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <input type="text" id="firstName" class="form-control" placeholder="First Name" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="lastName" class="form-control" placeholder="Last Name" required>
                        </div>
                        <div class="col-md-3">
                            <input type="text" id="zone" class="form-control" placeholder="Zone (e.g., Purok 1)" required>
                        </div>
                        <div class="col-md-2">
                            <select id="civilStatus" class="form-select" required>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Widowed">Widowed</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <button type="submit" class="btn btn-success w-100">Save</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Resident Data Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="card-title mb-0">Resident Masterlist</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Zone</th>
                            <th>Civil Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="residentTableBody">
                        <!-- Data will be injected here by app.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- The JavaScript link -->
    <script src="app.js"></script>
</body>
</html>
