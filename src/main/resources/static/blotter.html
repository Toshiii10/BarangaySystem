<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blotter Management - Barangay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Barangay Management System</span>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Residents</a>
                <a class="nav-link active" href="blotter.html">Blotter Records</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- File Complaint Form -->
        <div class="card mb-4 shadow-sm">
            <div class="card-header bg-danger text-white">
                <h5 class="card-title mb-0">File New Blotter / Incident</h5>
            </div>
            <div class="card-body">
                <form id="blotterForm">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label">Complainant (Resident ID)</label>
                            <input type="number" id="complainantId" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Respondent Name</label>
                            <input type="text" id="respondentName" class="form-control" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Incident Type</label>
                            <select id="incidentType" class="form-select" required>
                                <option value="Noise Complaint">Noise Complaint</option>
                                <option value="Property Dispute">Property Dispute</option>
                                <option value="Theft">Theft</option>
                                <option value="Physical Altercation">Physical Altercation</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Date</label>
                            <input type="date" id="incidentDate" class="form-control" required>
                        </div>
                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-danger w-100">File Record</button>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Incident Narrative</label>
                            <textarea id="narrative" class="form-control" rows="3" required></textarea>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Active Cases Table -->
        <div class="card shadow-sm">
            <div class="card-header bg-secondary text-white">
                <h5 class="card-title mb-0">Blotter Records</h5>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Case ID</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Respondent</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="blotterTableBody">
                        <!-- Injected by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="blotter.js"></script>
</body>
</html>
