<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barangay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
    
    <div class="card shadow-lg p-4" style="width: 25rem; border-radius: 10px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold">Barangay Management</h3>
            <p class="text-muted">Sign in to access your portal</p>
        </div>
        
        <!-- Error message (Hidden by default) -->
        <div id="errorAlert" class="alert alert-danger d-none text-center py-2">
            Invalid username or password.
        </div>

        <form id="loginForm">
            <!-- NEW: Role Selection Dropdown -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Login As</label>
                <select id="loginRole" class="form-select" required>
                    <option value="ADMIN">Barangay Official / Admin</option>
                    <option value="RESIDENT">Resident</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
        </form>

    <script src="login.js"></script>
</body>
</html>
