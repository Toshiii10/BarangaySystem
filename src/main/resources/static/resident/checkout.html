<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout - Barangay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0">Secure Payment Gateway</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <h5 class="text-muted">Total Amount Due</h5>
                            <h1 class="display-4 fw-bold text-success">₱100.00</h1>
                            <p class="small text-muted">Barangay Clearance Processing Fee</p>
                        </div>

                        <form id="paymentForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Select Payment Method</label>
                                <select class="form-select" id="paymentMethod">
                                    <option value="gcash">GCash</option>
                                    <option value="maya">Maya</option>
                                    <option value="card">Credit / Debit Card</option>
                                </select>
                            </div>
                            
                            <!-- Dummy input to simulate filling out details -->
                            <div class="mb-4">
                                <label class="form-label fw-bold">Account / Card Number</label>
                                <input type="text" class="form-control" placeholder="09XX XXX XXXX" required>
                            </div>

                            <button type="submit" id="payBtn" class="btn btn-success w-100 py-2 fw-bold text-uppercase">
                                Confirm Payment
                            </button>
                            <a href="/resident/portal.html" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- FRONTEND SECURITY GUARD ---
        const role = localStorage.getItem('userRole');
        const pendingDocumentId = localStorage.getItem('pendingDocumentId');

        if (role !== 'RESIDENT' || !pendingDocumentId) {
            window.location.href = '/resident/portal.html';
        }
        // -------------------------------

        document.getElementById('paymentForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                // Send the payment confirmation to the backend
                const response = await fetch(`/api/documents/${pendingDocumentId}/pay`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    alert("Payment Successful! Your receipt and clearance are now pending admin review.");
                    localStorage.removeItem('pendingDocumentId'); // Clear the session ID
                    window.location.href = '/resident/portal.html'; // Route back to dashboard
                } else {
                    alert("Payment failed. Please try again.");
                    btn.disabled = false;
                    btn.innerText = "Confirm Payment";
                }
            } catch (error) {
                console.error("Payment error:", error);
            }
        });
    </script>
</body>
</html>
